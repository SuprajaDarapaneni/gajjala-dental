<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gajjala Multispeciality Dental Hospital</title>
    <script>
      /**
       * Aggressive fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
       * This happens in some environments where window.fetch is a read-only getter and 
       * third-party libraries (like polyfills) try to overwrite it.
       */
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          
          // If the property exists but is not writable
          if (descriptor && (!descriptor.writable || descriptor.set === undefined)) {
            // Case 1: The property is configurable. We can redefine it.
            if (descriptor.configurable) {
              let currentFetch = window.fetch;
              Object.defineProperty(window, 'fetch', {
                get: function() { return currentFetch; },
                set: function(v) { 
                  console.info('Polyfill attempted to overwrite window.fetch. Overwrite allowed.');
                  currentFetch = v; 
                },
                configurable: true,
                enumerable: true
              });
            } 
            // Case 2: Not configurable. We can't use defineProperty.
            // In this case, we're mostly stuck, but some libraries check for configurable before assignment.
          }
        } catch (e) {
          // Failure is expected in extremely locked-down environments
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
